<div class="pref-switcher" data-pref-switcher>
    <button class="pref-toggle" id="pref-toggle" type="button" aria-expanded="false" aria-controls="pref-panel" title="阅读偏好" aria-label="阅读偏好">Aa</button>
    <div class="pref-panel" id="pref-panel" hidden>
        <label>
            <span>代码风格</span>
            <select data-pref-select="code-theme">
                <option value="ink">Warm Minimal</option>
                <option value="github">GitHub</option>
                <option value="anthropic">Anthropic</option>
                <option value="one-dark">One Dark</option>
            </select>
        </label>
        <label>
            <span>阅读字体</span>
            <select data-pref-select="ui-font">
                <option value="system">Poppins / Lora</option>
                <option value="serif">中文衬线</option>
                <option value="kai">楷体手记</option>
                <option value="mono">Mono Note</option>
            </select>
        </label>
        <label>
            <span>代码字体</span>
            <select data-pref-select="code-font">
                <option value="system">系统等宽</option>
                <option value="jetbrains">JetBrains Mono</option>
                <option value="cascadia">Cascadia Code</option>
                <option value="ibm">IBM Plex Mono</option>
                <option value="consolas">Consolas</option>
            </select>
        </label>
        <label>
            <span>文章宽度</span>
            <div class="pref-range-row">
                <input type="range" min="760" max="1280" step="40" data-pref-range="content-width">
                <output data-pref-output="content-width"></output>
            </div>
        </label>
    </div>
</div>

<script>
    (function () {
        var root = document.querySelector("[data-pref-switcher]");
        if (!root) return;

        var html = document.documentElement;
        var toggle = root.querySelector("#pref-toggle");
        var panel = root.querySelector("#pref-panel");
        var defaults = {
            "code-theme": "ink",
            "ui-font": "system",
            "code-font": "system",
            "content-width": "1040"
        };

        function dataKey(key) {
            return key.replace(/-([a-z])/g, function (_, letter) {
                return letter.toUpperCase();
            });
        }

        function storageGet(key) {
            try {
                var value = localStorage.getItem(key);
                if (key === "pref-code-font" && value === "jetbrains" && !localStorage.getItem("pref-v2")) {
                    return null;
                }
                return value;
            } catch (error) {
                return null;
            }
        }

        function storageSet(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (error) {}
        }

        function apply(key, value) {
            if (key === "content-width") {
                html.style.setProperty("--reader-width", value + "px");
                storageSet("pref-" + key, value);
                return;
            }
            html.dataset[dataKey(key)] = value;
            storageSet("pref-" + key, value);
        }

        root.querySelectorAll("[data-pref-select]").forEach(function (select) {
            var key = select.dataset.prefSelect;
            var value = storageGet("pref-" + key) || defaults[key];
            select.value = value;
            apply(key, value);
            select.addEventListener("change", function () {
                apply(key, select.value);
            });
        });

        root.querySelectorAll("[data-pref-range]").forEach(function (range) {
            var key = range.dataset.prefRange;
            var output = root.querySelector('[data-pref-output="' + key + '"]');
            var value = storageGet("pref-" + key) || defaults[key];
            range.value = value;

            function render() {
                if (output) output.textContent = range.value + "px";
                apply(key, range.value);
            }

            render();
            range.addEventListener("input", render);
        });

        storageSet("pref-v2", "1");

        function setOpen(open) {
            panel.hidden = !open;
            toggle.setAttribute("aria-expanded", String(open));
        }

        toggle.addEventListener("click", function () {
            setOpen(panel.hidden);
        });

        document.addEventListener("click", function (event) {
            if (!root.contains(event.target)) setOpen(false);
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") setOpen(false);
        });
    })();
</script>
