baseURL = "https://zijieguo2003.github.io/blog"
languageCode = "zh-cn"
title = "ZijieGuo 的技术博客"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "ZijieGuo"
  description = "技术教程与学习笔记"
  keywords = ["Hugo", "PaperMod", "技术博客", "ZijieGuo"]
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowRssButtonInSectionTermList = true

[params.profileMode]
  enabled = true
  title = "Hi, 我是 ZijieGuo"
  subtitle = "技术教程与学习笔记"
  imageUrl = "images/avatar.jpg"
  imageTitle = "ZijieGuo"
  imageWidth = 120
  imageHeight = 120

  [[params.profileMode.buttons]]
    name = "文章"
    url = "posts"

  [[params.profileMode.buttons]]
    name = "标签"
    url = "tags"

[params.assets]
  favicon = "favicon.jpg"
  favicon16x16 = "favicon.jpg"
  favicon32x32 = "favicon.jpg"
  apple_touch_icon = "favicon.jpg"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/zijieguo2003"

[[params.socialIcons]]
  name = "email"
  url = "mailto:zijieguo2003@gmail.com"

[[params.socialIcons]]
  name = "rss"
  url = "index.xml"

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 15
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
