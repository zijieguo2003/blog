baseURL = "https://zijieguo2003.github.io/blog"
languageCode = "zh-cn"
title = "ZijieGuo 的技术博客"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "ZijieGuo"
  description = "技术教程与学习笔记"
  keywords = ["Hugo", "PaperMod", "技术博客", "ZijieGuo"]
  mainSections = ["posts"]
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowRssButtonInSectionTermList = true

[params.profileMode]
  enabled = true
  title = "Hi, 我是 ZijieGuo"
  subtitle = "技术教程与学习笔记"
  imageUrl = "images/avatar.jpg"
  imageTitle = "ZijieGuo"
  imageWidth = 120
  imageHeight = 120

  [[params.profileMode.buttons]]
    name = "文章"
    url = "posts"

  [[params.profileMode.buttons]]
    name = "标签"
    url = "tags"

[params.assets]
  favicon = "favicon.jpg"
  favicon16x16 = "favicon.jpg"
  favicon32x32 = "favicon.jpg"
  apple_touch_icon = "favicon.jpg"

[params.editPost]
  URL = "https://github.com/zijieguo2003/blog/edit/master/content"
  Text = "在线编辑"
  appendFilePath = true
  vscodeURL = "https://github.dev/zijieguo2003/blog/blob/master/content"
  vscodeText = "Web IDE"

[[params.postTopics]]
  name = "Harness工程"
  description = "围绕 Agent、工具调用、调试记录和工程化实践的系统笔记。"
  match = ["Harness工程", "Claude Code", "Agent", "LLM", "源码阅读", "Debug"]
  accent = "#d97757"

[[params.postTopics]]
  name = "生活随笔"
  description = "零散观察、阶段复盘，以及不完全技术向的记录。"
  match = ["生活随笔", "生活", "随笔"]
  accent = "#788c5d"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/zijieguo2003"

[[params.socialIcons]]
  name = "email"
  url = "mailto:zijieguo2003@gmail.com"

[[params.socialIcons]]
  name = "rss"
  url = "index.xml"

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 15
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5
